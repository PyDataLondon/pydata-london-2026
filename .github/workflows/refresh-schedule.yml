name: Refresh schedule

on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC daily — off-peak, deliberately not on the hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jinja2 'qrcode[pil]'

      - name: Build recommender
        run: python scripts/build_recommender.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- recommender.md schedule.json qr.svg; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recommender.md schedule.json qr.svg
          git commit -m "Refresh schedule from pretalx

          Auto-generated by .github/workflows/refresh-schedule.yml"
          git push
